generation:
  provider: tgis # tgis or nlp
  service:
    hostname: localhost
    port: 10000
chunkers:
  test_chunker:
    type: sentence
    service:
      hostname: localhost
      port: 8085
detectors:
  test_detector:
    type: text_contents
    service:
      hostname: localhost
      port: 8000
    chunker_id: test_chunker
    default_threshold: 0.5
  contents_test_detector:
    type: text_contents
    service:
      hostname: localhost
      port: 10001
    chunker_id: test_chunker
    default_threshold: 0.5
  chat_test_detector:
    type: text_chat
    service:
      hostname: localhost
      port: 10002
    chunker_id: test_chunker
    default_threshold: 0.1
